<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Scroll + Hero Text + Bottom Menu</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }

    .scroll-wrap {
      height: 300vh; /* 有足夠高度才捲得到 bottom 區段 */
    }

    .animation-container {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* 背景層：影片 / 序列圖 */
    .animation-container video,
    .animation-container img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      display: none; /* JS 再決定誰顯示 */
    }

    /* ⭐ 頂部 / 中間共用的文字（壓在背景上） */
.hero-overlay {
  position: absolute;
  inset: 0;
  z-index: 15;
  pointer-events: none;
  box-sizing: border-box;
}

/* ⭐ 整組 h1 + p：靠左 + 上下置中 */
.hero-text {
  position: absolute;
  top: 50%;                  /* 往下 50% */
  left: 100px;                /* 距離左邊，可改 40 / 80 */
  transform: translateY(-50%); /* 再往上拉自己高度一半 → 正中間 */
  text-align: left;
}
.hero-text h1 {
  position: static;          /* 確保不是 absolute */
  display: block;
  font-size: 100px;           /* 150px 太誇張可以先小一點 */
  margin: 10 0 0px;          /* 和下面 p 的間距 */
  line-height: 1.1;          /* 避免行距太小 */
  text-shadow: 0 4px 12px rgba(0, 0, 0, 0);
}

/* ⭐ p：小字，跟在 h1 下面 */
.hero-text p {
  position: static;
  display: block;
  font-size: 40px;
  margin: 0;
  line-height: 1.5;
  max-width: 700px;
  text-shadow: 0 3px 8px rgba(0, 0, 0, 0);
}

/* ⭐ 底部選單 overlay（只在 bottom 模式顯示） */
.menu-overlay {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  padding: 16px 32px;
  box-sizing: border-box;
  z-index: 20;
  display: none; /* 一開始隱藏，JS 控制 */
  background: linear-gradient(
  to top,
   rgba(0, 0, 0, 0),
   rgba(0, 0, 0, 0)
      );
    }

    .menu {
      display: flex;
      gap: 24px;
      justify-content: flex-end;
    }

    .menu a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      padding: 24px 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      transition: 0.2s;
    }

    .menu a:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* debug 文字，可有可無 */
    #debug {
      position: fixed;
      left: 10px;
      bottom: 10px;
      color: #fff;
      font-size: 12px;
      opacity: 0.7;
      pointer-events: none;
      z-index: 999;
    }

}

  </style>
</head>
<body>

  <div class="scroll-wrap">
    <div class="animation-container">
      <!-- 上方 idle 影片 -->
      <video
        id="idleTopVideo"
        src="img_A_mov/A_movie_6fps_v001.mp4"
        muted
        loop
        playsinline
      ></video>

      <!-- 中間序列圖 -->
      <img
        id="avatar"
        src="img_A_sequence/4974438-uhd_4096_2160_25fps0022.png"
        alt="虛擬人逐格動畫"
      >

      <!-- 底部 idle 影片 -->
      <video
        id="idleBottomVideo"
        src="img_A_mov/A_bottom_movie_6fps_v001.mp4"
        muted
        loop
        playsinline
      ></video>

      <!-- ⭐ 頂部 / 中間 顯示的文字（壓在影片 / 序列上） -->
      <div class="hero-overlay">
        <div class="hero-text">
           <h1>VIRTUAL HUMAN</h1>
           <p>你的智慧夥伴，隨時優化每一刻</p>
           <p>Your Intelligent Companion to Optimize Every Moment</p>
        </div>
      </div>

      <!-- ⭐ 底部選單（只在 bottom 模式顯示） -->
      <div class="menu-overlay">
        <nav class="menu">
          <a href="#about">關於我</a>
          <a href="#works">作品集</a>
          <a href="#contact">聯絡方式</a>
        </nav>
      </div>
    </div>
  </div>

  <div id="debug"></div>

  <script src="main.js"></script>
</body>
</html>
